backwards_compatibility:
  required: true
  default_state: disabled
  
integration_pattern:
  follow_existing: true
  reference_files:
    - "arbiter.py"
    - "stigmergy.py"
  
error_handling:
  pattern: "fire_and_forget"
  failure_behavior: "log_and_swallow"
  
dependencies:
  external_new: false
  python_version: "3.12+"
  pydantic_version: "v2"
  
testing:
  existing_tests: "must_pass"
  new_coverage: "required"
  
lifecycle_events:
  trigger_points:
    - "detected"
    - "triaging" 
    - "remediating"
    - "resolved"
    - "escalated"
  
wiring_points:
  primary:
    - "_resolve_incident()"
    - "_escalate_incident()"
  secondary:
    - "early lifecycle transitions (TBD)"